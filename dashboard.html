<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f172a"/>
<title>CoachTennis IA · Estadísticas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:#f1f5f9;color:#0f172a;min-height:100vh}
.mono{font-family:'DM Mono',monospace}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo} = React;

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ⚙️  MISMO valor que en index.html
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const SUPABASE_URL  = "https://igqlsofrczrydllubhwq.supabase.co/rest/v1/";
const SUPABASE_ANON = "sb_publishable_RHmTWwyUrzbrELMG5ibz0A_lduESQyc";
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ── UI Atoms ── */
const Card=({children,style:sx={}})=>(
  <div style={{background:"#fff",borderRadius:16,border:"1px solid #e2e8f0",padding:16,...sx}}>{children}</div>
);
const Chip=({children,color="gray"})=>{
  const c={gray:{bg:"#f1f5f9",text:"#475569"},green:{bg:"#dcfce7",text:"#166534"},
    red:{bg:"#fee2e2",text:"#991b1b"},blue:{bg:"#eff6ff",text:"#1d4ed8"},
    amber:{bg:"#fef3c7",text:"#92400e"},violet:{bg:"#f5f3ff",text:"#6d28d9"}};
  const s=c[color]||c.gray;
  return <span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:20,background:s.bg,color:s.text,display:"inline-flex",alignItems:"center"}}>{children}</span>;
};
const Btn=({onClick,children,variant="default",size="md",style:sx={}})=>{
  const [hov,setHov]=useState(false);
  const sz={sm:{padding:"6px 14px",fontSize:12},md:{padding:"9px 18px",fontSize:13}};
  const vr={
    default:{background:hov?"#1e293b":"#0f172a",color:"#fff"},
    outline:{background:hov?"#f8fafc":"#fff",color:"#0f172a",border:"1px solid #e2e8f0"},
    ghost:{background:hov?"#f1f5f9":"transparent",color:"#64748b"},
  };
  return <button onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
    style={{border:"none",borderRadius:11,fontWeight:500,fontFamily:"inherit",cursor:"pointer",
      display:"inline-flex",alignItems:"center",gap:6,justifyContent:"center",transition:"all .15s",...sz[size],...vr[variant],...sx}}>{children}</button>;
};

/* ── Mini Bar Chart ── */
const BarChart=({data,colorFn,maxVal})=>{
  const max=maxVal||Math.max(...data.map(d=>d.value),1);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {data.map((d,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:80,fontSize:11,color:"#64748b",textAlign:"right",flexShrink:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{d.label}</div>
          <div style={{flex:1,background:"#f1f5f9",borderRadius:6,height:20,overflow:"hidden"}}>
            <div style={{width:`${(d.value/max)*100}%`,height:"100%",background:colorFn?colorFn(d,i):"#0f172a",borderRadius:6,minWidth:d.value>0?4:0,transition:"width .4s ease",display:"flex",alignItems:"center",paddingLeft:6}}>
              {d.value>0&&<span style={{fontSize:10,fontWeight:600,color:"#fff",whiteSpace:"nowrap"}}>{d.value}</span>}
            </div>
          </div>
          {d.extra!==undefined&&<div style={{fontSize:11,color:"#94a3b8",width:32,textAlign:"right",flexShrink:0}}>{d.extra}</div>}
        </div>
      ))}
    </div>
  );
};

/* ── Donut ── */
const Donut=({pct,color,size=80,label})=>{
  const r=30,circ=2*Math.PI*r;
  const dash=circ*(pct/100);
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      <svg width={size} height={size} viewBox="0 0 80 80">
        <circle cx="40" cy="40" r={r} fill="none" stroke="#f1f5f9" strokeWidth="10"/>
        <circle cx="40" cy="40" r={r} fill="none" stroke={color} strokeWidth="10"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          transform="rotate(-90 40 40)" style={{transition:"stroke-dasharray .6s ease"}}/>
        <text x="40" y="44" textAnchor="middle" fontSize="14" fontWeight="700" fontFamily="DM Sans" fill="#0f172a">{pct}%</text>
      </svg>
      {label&&<div style={{fontSize:11,color:"#64748b",textAlign:"center"}}>{label}</div>}
    </div>
  );
};

/* ── Stat Card ── */
const StatCard=({label,value,sub,color="#0f172a",icon})=>(
  <Card>
    <div style={{display:"flex",items:"center",justifyContent:"space-between",marginBottom:4}}>
      <div style={{fontSize:11,fontWeight:600,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
      {icon&&<span style={{fontSize:18}}>{icon}</span>}
    </div>
    <div style={{fontSize:28,fontWeight:700,color,lineHeight:1,marginBottom:2}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:"#94a3b8"}}>{sub}</div>}
  </Card>
);

/* ── Recent Matches Table ── */
const MatchRow=({m})=>{
  const sets=m.score?.sets||[];
  const myW=m.sets_won||sets.filter(s=>s.winner==="my").length;
  const opW=m.sets_lost||sets.filter(s=>s.winner==="opp").length;
  const setStr=sets.length?sets.map(s=>`${s.my}-${s.opp}`).join("  "):`${myW}-${opW} sets`;
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid #f1f5f9"}}>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:13,fontWeight:500,color:"#0f172a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.opp_name||"Rival"}</div>
        <div style={{fontSize:11,color:"#94a3b8"}}>{m.date} · {m.surface}{m.tournament?" · "+m.tournament:""}</div>
      </div>
      <div className="mono" style={{fontSize:12,color:"#64748b",flexShrink:0}}>{setStr}</div>
      <Chip color={myW>opW?"green":opW>myW?"red":"gray"}>{myW>opW?"W":opW>myW?"L":"—"}</Chip>
    </div>
  );
};

/* ── Main Dashboard ── */
function Dashboard(){
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [matches,setMatches]=useState([]);
  const [filter,setFilter]=useState("all"); // all | clay | hard | grass | indoor
  const [period,setPeriod]=useState("all"); // all | 30 | 90

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){setUser(session.user);loadData(session.user.id);}
      else setLoading(false);
    });
  },[]);

  const loadData=async(uid)=>{
    setLoading(true);
    const {data,error}=await sb.from("matches").select("*").eq("user_id",uid).order("date",{ascending:false});
    if(!error&&data) setMatches(data);
    setLoading(false);
  };

  /* Filtros */
  const filtered=useMemo(()=>{
    let m=matches;
    if(filter!=="all") m=m.filter(x=>x.surface?.toLowerCase()===filter);
    if(period!=="all"){
      const days=parseInt(period);
      const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
      m=m.filter(x=>new Date(x.date)>=cutoff);
    }
    return m;
  },[matches,filter,period]);

  /* Estadísticas */
  const stats=useMemo(()=>{
    if(!filtered.length) return null;
    const total=filtered.length;
    const wins=filtered.filter(m=>m.sets_won>m.sets_lost).length;
    const winPct=total?Math.round((wins/total)*100):0;

    // Por superficie
    const surfs=["Arcilla","Dura","Césped","Indoor"];
    const bySurf=surfs.map(s=>{
      const ms=filtered.filter(m=>m.surface===s);
      const w=ms.filter(m=>m.sets_won>m.sets_lost).length;
      return{label:s,value:ms.length,wins:w,pct:ms.length?Math.round((w/ms.length)*100):0};
    }).filter(s=>s.value>0);

    // Por rival (top 5)
    const rivalMap={};
    filtered.forEach(m=>{
      const k=m.opp_name||"Rival";
      if(!rivalMap[k]) rivalMap[k]={label:k,value:0,wins:0};
      rivalMap[k].value++;
      if(m.sets_won>m.sets_lost) rivalMap[k].wins++;
    });
    const rivals=Object.values(rivalMap).sort((a,b)=>b.value-a.value).slice(0,6).map(r=>({...r,extra:`${r.wins}V`}));

    // Observaciones más frecuentes
    const obsMap={};
    filtered.forEach(m=>{
      const obs=m.obs_data||{};
      Object.entries(obs).forEach(([k,v])=>{
        if(v>0){obsMap[k]=(obsMap[k]||0)+v;}
      });
    });
    const OBS_LABELS={missBH:"Falla revés",missFH:"Falla derecha",weak2nd:"2do saque débil",hatesNet:"Evita la red",strugglesHigh:"Sufre topspin alto",slowMove:"Lento piernas",tightPressure:"Se tensa",shortBall:"Pelotas cortas"};
    const obsData=Object.entries(obsMap).map(([k,v])=>({label:OBS_LABELS[k]||k,value:v})).sort((a,b)=>b.value-a.value).slice(0,6);

    // Racha actual
    let streak=0,streakType="";
    for(const m of filtered){
      const w=m.sets_won>m.sets_lost;
      if(streak===0){streak=1;streakType=w?"W":"L";}
      else if((w&&streakType==="W")||(!w&&streakType==="L")) streak++;
      else break;
    }

    // Sets jugados total
    const totalSets=filtered.reduce((a,m)=>(a+(m.sets_won||0)+(m.sets_lost||0)),0);
    const setsWon=filtered.reduce((a,m)=>a+(m.sets_won||0),0);

    return{total,wins,winPct,bySurf,rivals,obsData,streak,streakType,totalSets,setsWon};
  },[filtered]);

  if(loading) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontSize:13,color:"#94a3b8"}}>Cargando estadísticas...</div>
    </div>
  );

  if(!user) return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <Card style={{maxWidth:360,width:"100%",textAlign:"center",padding:32}}>
        <div style={{fontSize:36,marginBottom:12}}>🔒</div>
        <div style={{fontWeight:600,marginBottom:8}}>Acceso restringido</div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:16}}>Iniciá sesión en la app principal para ver tus estadísticas.</div>
        <Btn onClick={()=>window.location.href="index.html"}>Ir a la app →</Btn>
      </Card>
    </div>
  );

  const userName=user.user_metadata?.full_name||user.email?.split("@")[0]||"Jugador";

  return(
    <div style={{background:"#f1f5f9",minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"#0f172a",color:"#fff",padding:"0"}}>
        <div style={{maxWidth:900,margin:"0 auto",padding:"16px 16px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:36,height:36,borderRadius:10,background:"rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>📊</div>
              <div>
                <div style={{fontSize:16,fontWeight:700}}>Estadísticas · CoachTennis IA</div>
                <div style={{fontSize:11,color:"#94a3b8"}}>Hola, {userName} · {matches.length} partido{matches.length!==1?"s":""} registrado{matches.length!==1?"s":""}</div>
              </div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <Btn onClick={()=>window.location.href="index.html"} variant="outline" size="sm" style={{borderColor:"rgba(255,255,255,0.2)",color:"#fff",background:"transparent"}}>← Volver a la app</Btn>
              <Btn onClick={()=>{sb.auth.signOut();window.location.href="index.html";}} variant="ghost" size="sm" style={{color:"#94a3b8"}}>Salir</Btn>
            </div>
          </div>
        </div>
      </div>

      <div style={{maxWidth:900,margin:"0 auto",padding:"16px 12px 60px"}}>
        {/* Filtros */}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
          <div style={{display:"flex",gap:4,background:"#fff",borderRadius:10,border:"1px solid #e2e8f0",padding:4}}>
            {["all","Arcilla","Dura","Césped","Indoor"].map(s=>(
              <button key={s} onClick={()=>setFilter(s==="all"?"all":s)}
                style={{padding:"5px 10px",fontSize:11,fontWeight:500,borderRadius:7,border:"none",cursor:"pointer",
                  background:filter===(s==="all"?"all":s)?"#0f172a":"transparent",
                  color:filter===(s==="all"?"all":s)?"#fff":"#64748b"}}>
                {s==="all"?"Todas":s}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:4,background:"#fff",borderRadius:10,border:"1px solid #e2e8f0",padding:4}}>
            {[{v:"all",l:"Siempre"},{v:"30",l:"30 días"},{v:"90",l:"90 días"}].map(({v,l})=>(
              <button key={v} onClick={()=>setPeriod(v)}
                style={{padding:"5px 10px",fontSize:11,fontWeight:500,borderRadius:7,border:"none",cursor:"pointer",
                  background:period===v?"#0f172a":"transparent",color:period===v?"#fff":"#64748b"}}>
                {l}
              </button>
            ))}
          </div>
        </div>

        {!stats?(
          <Card style={{textAlign:"center",padding:"48px 16px"}}>
            <div style={{fontSize:36,marginBottom:8}}>🎾</div>
            <div style={{fontSize:14,color:"#94a3b8",marginBottom:4}}>No hay partidos para mostrar.</div>
            <div style={{fontSize:12,color:"#cbd5e1"}}>Guardá partidos desde la app para ver estadísticas aquí.</div>
            <Btn onClick={()=>window.location.href="index.html"} size="sm" style={{marginTop:16}}>Ir a la app →</Btn>
          </Card>
        ):(
          <>
            {/* KPIs principales */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:14}}>
              <StatCard label="Partidos" value={stats.total} icon="🎾" sub={`${filtered.length} en filtro`}/>
              <StatCard label="Victorias" value={stats.wins} icon="🏆" color="#059669" sub={`${stats.total-stats.wins} derrotas`}/>
              <StatCard label="Win Rate" value={`${stats.winPct}%`} icon="📈" color={stats.winPct>=50?"#059669":"#dc2626"}/>
              <StatCard label="Sets ganados" value={stats.setsWon} icon="💪" sub={`de ${stats.totalSets} jugados`} color="#1d4ed8"/>
              <StatCard label="Racha actual" value={`${stats.streak}${stats.streakType}`} icon={stats.streakType==="W"?"🔥":"❄️"}
                color={stats.streakType==="W"?"#059669":"#dc2626"} sub="partidos seguidos"/>
            </div>

            {/* Win rate visual + por superficie */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:12,marginBottom:12}}>
              <Card>
                <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>Win Rate general</div>
                <div style={{display:"flex",alignItems:"center",gap:20}}>
                  <Donut pct={stats.winPct} color={stats.winPct>=50?"#059669":"#dc2626"} size={90} label="Win rate"/>
                  <div style={{flex:1}}>
                    <div style={{marginBottom:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                        <span style={{color:"#059669",fontWeight:500}}>Victorias</span>
                        <span style={{fontWeight:600}}>{stats.wins}</span>
                      </div>
                      <div style={{height:6,background:"#f1f5f9",borderRadius:6}}>
                        <div style={{height:"100%",width:`${stats.winPct}%`,background:"#059669",borderRadius:6}}/>
                      </div>
                    </div>
                    <div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                        <span style={{color:"#dc2626",fontWeight:500}}>Derrotas</span>
                        <span style={{fontWeight:600}}>{stats.total-stats.wins}</span>
                      </div>
                      <div style={{height:6,background:"#f1f5f9",borderRadius:6}}>
                        <div style={{height:"100%",width:`${100-stats.winPct}%`,background:"#dc2626",borderRadius:6}}/>
                      </div>
                    </div>
                  </div>
                </div>
              </Card>

              <Card>
                <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>Por superficie</div>
                {stats.bySurf.length?(
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {stats.bySurf.map(s=>(
                      <div key={s.label}>
                        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
                          <span style={{color:"#64748b"}}>{s.label}</span>
                          <span style={{color:"#94a3b8"}}>{s.wins}V / {s.value-s.wins}D · <strong style={{color:s.pct>=50?"#059669":"#dc2626"}}>{s.pct}%</strong></span>
                        </div>
                        <div style={{height:8,background:"#f1f5f9",borderRadius:6,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${s.pct}%`,background:s.label==="Arcilla"?"#d97706":s.label==="Dura"?"#3b82f6":s.label==="Césped"?"#059669":"#6366f1",borderRadius:6,transition:"width .4s"}}/>
                        </div>
                      </div>
                    ))}
                  </div>
                ):<div style={{fontSize:12,color:"#94a3b8",fontStyle:"italic"}}>Sin datos suficientes</div>}
              </Card>
            </div>

            {/* Rivales y observaciones */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:12,marginBottom:12}}>
              <Card>
                <div style={{fontSize:13,fontWeight:600,marginBottom:14}}>Rivales más frecuentes</div>
                {stats.rivals.length?(
                  <BarChart data={stats.rivals} colorFn={(d)=>d.wins/d.value>=0.5?"#059669":"#f87171"}/>
                ):<div style={{fontSize:12,color:"#94a3b8",fontStyle:"italic"}}>Sin datos suficientes</div>}
              </Card>

              <Card>
                <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>Patrones detectados en rivales</div>
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:12}}>Observaciones acumuladas en todos los partidos</div>
                {stats.obsData.length?(
                  <BarChart data={stats.obsData} colorFn={(_,i)=>{
                    const cols=["#f59e0b","#ef4444","#3b82f6","#8b5cf6","#10b981","#f97316"];
                    return cols[i%cols.length];
                  }}/>
                ):<div style={{fontSize:12,color:"#94a3b8",fontStyle:"italic"}}>Sin observaciones registradas aún</div>}
              </Card>
            </div>

            {/* Últimos partidos */}
            <Card>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:600}}>Últimos partidos</div>
                <Chip color="gray">{filtered.length} partidos</Chip>
              </div>
              {filtered.slice(0,15).map((m,i)=><MatchRow key={m.id||i} m={m}/>)}
              {filtered.length===0&&<div style={{fontSize:12,color:"#94a3b8",fontStyle:"italic",padding:"12px 0"}}>Sin partidos en el filtro seleccionado.</div>}
            </Card>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
</script>
</body>
</html>
